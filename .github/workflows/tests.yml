name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Smoke testleri CI'da calismaz: modeller runner'da indirilmis degildir.
      # pytest.ini varsayilan olarak "-m not smoke" uygular.
      - name: Run unit tests
        run: python -m pytest
